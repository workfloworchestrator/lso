[project]
site_name = "Lightweight Service Orchestrator"
site_description = "A Lightweight Service Orchestrator for remotely executing Ansible playbooks and (Python) scripts."
site_author = "GÉANT Orchestration and Automation Team"
site_url = "https://workfloworchestrator.org/lso"
copyright = "Copyright &copy; 2023 - 2026 GÉANT Vereniging"
docs_dir = "docs"
repo_url = "https://github.com/workfloworchestrator/lso"
repo_name = "workfloworchestrator/lso"
extra_css = ["css/extra.css"]

# Read more: https://zensical.org/docs/setup/navigation/
# nav = [
#   { "Get started" = "index.md" },
#   { "Markdown in 5min" = "markdown.md" },
# ]

[project.theme]
favicon = "img/favicon.png"
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "content.footnote.tooltips",
    "content.tabs.link",
    "content.tooltips",
    "header.autohide",
    "navigation.expand",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.path",
    "navigation.prune",
    "navigation.sections",
    #"navigation.tabs",
    #"navigation.tabs.sticky",
    "navigation.top",
    "search.highlight",
    "toc.follow",
    "toc.integrate",
]

logo = "img/logo.png"

[project.markdown_extensions.admonition]
[project.markdown_extensions.abbr]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.snippets]
auto_append = ["includes/abbreviations.md"]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]
[project.plugins.mkdocstrings.handlers.python]
inventories = ["https://docs.python.org/3/objects.inv"]
paths = ["lso"]
[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "google"
inherited_members = true
show_source = false

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"
primary = "indigo"
accent = "deep orange"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
primary = "indigo"
accent = "deep orange"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"
primary = "indigo"
accent = "deep orange"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/orchestrator-lso"
name = "LSO on PyPI"

[[project.extra.social]]
icon = "fontawesome/brands/discord"
link = "https://discord.gg/fQkQn5ajFR"
name = "WFO on Discord"

[[project.extra.social]]
icon = "fontawesome/brands/gitlab"
link = "https://gitlab.software.geant.org/goat"
name = "GÉANT Orchestration and Automation Team GitLab"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/geant"
name = "GÉANT Project GitHub"
